<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { margin: 10px; padding: 10px 20px; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f5f5f5; }
        .navbar { background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-menu { display: flex; list-style: none; margin: 0; padding: 0; gap: 20px; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        .username-display { color: #4a90e2; font-weight: 500; }
        .logout-btn { background: #ff4d4f; color: white; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h1>Promptify</h1>
        </div>
        <ul class="nav-menu">
            <li><a href="#home" style="color: white;">Home</a></li>
            <li><a href="#pricing" style="color: white;">Pricing</a></li>
            <li><a href="#blog" style="color: white;">Blog</a></li>
        </ul>
        <div class="user-section" id="navUserArea">
            <!-- Will be populated by JavaScript -->
        </div>
    </nav>

    <h1>Login Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="checkLoginStatus()">Check Login Status</button>
    <button onclick="testLogout()">Test Logout</button>
    <button onclick="updateNavbar()">Update Navbar</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'Bharani', password: 'Bharani123' })
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                if (data.success) {
                    localStorage.setItem('promptify.username', data.username);
                    updateNavbar();
                    alert('Login successful! Username saved to localStorage.');
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `Error: ${error.message}`;
            }
        }

        function checkLoginStatus() {
            const username = localStorage.getItem('promptify.username');
            document.getElementById('result').innerHTML = `Logged in as: ${username || 'Not logged in'}`;
        }

        function testLogout() {
            localStorage.removeItem('promptify.username');
            updateNavbar();
            document.getElementById('result').innerHTML = 'Logged out successfully!';
        }

        function updateNavbar() {
            const username = localStorage.getItem('promptify.username');
            const navUserArea = document.getElementById('navUserArea');
            
            if (username && navUserArea) {
                navUserArea.innerHTML = `
                    <span class="username-display">👤 ${username}</span>
                    <button class="logout-btn" onclick="testLogout()">Logout</button>
                `;
            } else if (navUserArea) {
                navUserArea.innerHTML = '';
            }
        }

        // Update navbar on page load
        document.addEventListener('DOMContentLoaded', updateNavbar);
    </script>
</body>
</html>
